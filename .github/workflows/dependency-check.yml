name: OWASP Dependency Check

# Advisory scan — runs for visibility but must not block merge/release (not on critical path).
on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  dependency-check:
    name: OWASP dependency check (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run OWASP dependency check
        id: owasp
        continue-on-error: true
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: '**/build/reports/dependency-check-report.html'
          retention-days: 14
          if-no-files-found: ignore

      - name: Workflow summary
        if: always()
        run: |
          if [ "${{ steps.owasp.outcome }}" = "success" ]; then
            echo "## OWASP dependency check: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## OWASP dependency check: findings (advisory — does not block merge)" >> "$GITHUB_STEP_SUMMARY"
            echo "Download the HTML report from workflow artifacts." >> "$GITHUB_STEP_SUMMARY"
          fi
