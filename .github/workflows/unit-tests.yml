name: Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Java unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Configure Git for tests
        run: |
          git config --global user.name "dm.ai"
          git config --global user.email "dm.ai@epam.com"

      - name: Run unit tests
        run: ./gradlew :dmtools-core:test --no-daemon -x integrationTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify agent snapshots are up-to-date
        run: |
          node testing/scripts/generate_agent_snapshots.js
          if [ -n "$(git diff --name-only snapshots/)" ] || [ -n "$(git ls-files --others --exclude-standard snapshots/)" ]; then
            echo "❌ Agent snapshots are out of date."
            echo "Run 'node testing/scripts/generate_agent_snapshots.js' locally and commit the changes."
            git diff --stat snapshots/
            exit 1
          fi
          echo "✅ Agent snapshots are up-to-date."

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Unit Test Results
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
